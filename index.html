
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Elite AUCTIONS | Luxury & Collectibles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            navy: '#0A0F2C',
                            charcoal: '#1A1A1A',
                            gold: '#D4AF37',
                            goldLight: '#F3E5AB',
                            goldDark: '#996515',
                            slate: '#708090',
                            khalti: '#5C2D91',
                            esewa: '#60BB46'
                        }
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['Inter', '"Noto Sans Devanagari"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0A0F2C;
            color: #FFFFFF;
            font-family: 'Inter', '"Noto Sans Devanagari"', sans-serif;
        }
        .luxury-gradient {
            background: linear-gradient(135deg, #D4AF37 0%, #996515 100%);
        }
        .luxury-text-gradient {
            background: linear-gradient(135deg, #F3E5AB 0%, #D4AF37 50%, #996515 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nepal-pattern {
            background-color: #0a0f2c;
            background-image: url("https://www.transparenttextures.com/patterns/cubes.png");
            background-attachment: fixed;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* Low Bandwidth Mode Adjustments */
        .low-bandwidth img {
            filter: grayscale(100%) contrast(120%);
            image-rendering: crisp-edges;
        }
        .low-bandwidth .animate-pulse, 
        .low-bandwidth .animate-ping, 
        .low-bandwidth .animate-bounce {
            animation: none !important;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0A0F2C;
        }
        ::-webkit-scrollbar-thumb {
            background: #D4AF37;
            border-radius: 10px;
        }
    </style>
<script type="importmap">

</html>
